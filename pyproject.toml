[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gitea-async-sdk"
version = "1.25.4"
description = "An async Python SDK for the Gitea API v1.25.4, generated from the official OpenAPI spec."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "Gitea Python Maintainers", email = "maintainers@example.com" }
]
keywords = ["gitea", "sdk", "api", "async", "aiohttp", "openapi"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Framework :: AsyncIO",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
requires-python = ">=3.10"

dependencies = [
    "aiohttp>=3.9,<4.0",
    "aiohttp-retry>=2.8,<3.0",
    "python-dateutil>=2.8,<3.0",
    "pydantic>=2.0,<3.0",
    "typing-extensions>=4.7",
    "urllib3>=1.25.3,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "coverage[toml]>=7.0",
    "mypy>=1.8",
    "ruff>=0.3",
]

[project.urls]
Homepage = "https://github.com/VINOD9876/gitea-async-sdk"
Repository = "https://github.com/VINOD9876/gitea-async-sdk"
"Bug Tracker" = "https://github.com/VINOD9876/gitea-async-sdk/issues"
Documentation = "https://github.com/VINOD9876/gitea-async-sdk#readme"

[tool.hatch.build.targets.wheel]
packages = ["gitea_async"]

[tool.hatch.build.targets.sdist]
include = [
    "gitea_async/",
    "pyproject.toml",
    "README.md",
    "LICENSE",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true
